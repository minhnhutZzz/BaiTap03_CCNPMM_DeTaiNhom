<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông Tin Profile - Profile Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container" style="max-width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
      <a href="/" class="navbar-brand">Profile Manager</a>
      <div class="navbar-menu">
        <span id="userEmail" style="color: var(--gray-600); font-size: 0.875rem; margin-right: 1rem;"></span>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">Đăng Xuất</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="card">
      <div class="card-header">Thông Tin Cá Nhân</div>

      <div id="profileContent">
        <div class="loading">
          <div class="spinner"></div>
          <p>Đang tải thông tin...</p>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2026 Profile Manager. All rights reserved.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if not logged in
    if (!Auth.isLoggedIn()) {
      window.location.href = '/login.html';
    }

    // Load profile
    async function loadProfile() {
      try {
        const response = await ApiClient.get('/profile');
        displayProfile(response.data);
      } catch (error) {
        document.getElementById('profileContent').innerHTML = `
          <div style="text-align: center; padding: 2rem; color: var(--gray-500);">
            <p>Không thể tải thông tin. Vui lòng thử lại.</p>
            <button class="btn btn-primary" onclick="loadProfile()">Thử Lại</button>
          </div>
        `;
      }
    }

    function displayProfile(data) {
      const { user, profile } = data;

      // Set user email in navbar
      document.getElementById('userEmail').textContent = user.email;

      const html = `
        <div class="profile-info">
          <div class="info-item">
            <div class="info-label">ID</div>
            <div class="info-value">#${user.id}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Vai Trò</div>
            <div class="info-value">${user.role === 'admin' ? '👤 Admin' : '👤 User'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Email</div>
            <div class="info-value">${user.email}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Trạng Thái</div>
            <div class="info-value">${user.is_verified ? '✅ Đã xác thực' : '❌ Chưa xác thực'}</div>
          </div>
        </div>

        <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--gray-200);">

        <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: var(--gray-900);">Thông Tin Chi Tiết</h3>

        <div class="profile-info">
          <div class="info-item">
            <div class="info-label">Họ Tên</div>
            <div class="info-value ${!profile.full_name ? 'empty' : ''}">${profile.full_name || 'Chưa cập nhật'}</div>
          </div>
          <div class="info-item">
            <div class="info-label">Số Điện Thoại</div>
            <div class="info-value ${!profile.phone ? 'empty' : ''}">${profile.phone || 'Chưa cập nhật'}</div>
          </div>
        </div>

        <div class="form-group">
          <label>Địa Chỉ</label>
          <div class="info-item" style="background: var(--gray-100); padding: 0.75rem;">
            <div class="info-value ${!profile.address ? 'empty' : ''}">${profile.address || 'Chưa cập nhật'}</div>
          </div>
        </div>

        <div class="button-group">
          <a href="/edit-profile.html" class="btn btn-primary">✏️ Chỉnh Sửa</a>
          <button class="btn btn-secondary" onclick="window.location.href='/'">🏠 Về Trang Chủ</button>
        </div>
      `;

      document.getElementById('profileContent').innerHTML = html;
    }

    // Load profile on page load
    loadProfile();

    // Refresh every 30 seconds
    setInterval(loadProfile, 30000);
  </script>
</body>
</html>
