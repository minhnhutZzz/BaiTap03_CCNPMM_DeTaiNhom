<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Profile Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container" style="max-width: 100%; padding: 0 20px;">
      <a href="/" class="navbar-brand">Profile Manager</a>
    </div>
  </nav>

  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="card">
      <div class="card-header">Đăng Nhập</div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
          <div class="form-text">Nhập email của bạn</div>
        </div>

        <div class="form-group">
          <label for="password">Mật Khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
          />
          <div class="form-text">Nhập mật khẩu của bạn</div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Đăng Nhập
        </button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; color: var(--gray-500); font-size: 0.875rem;">
        <p>Chưa có tài khoản? <a href="#" style="color: var(--primary-color); text-decoration: none;">Đăng ký</a></p>
      </div>
    </div>

    <div style="background: var(--gray-100); padding: 1rem; border-radius: 0.375rem; margin-top: 2rem; font-size: 0.85rem;">
      <p><strong>Tài khoản demo:</strong></p>
        <p>👤 Admin - Email: <code style="background: white; padding: 0.2rem 0.4rem; border-radius: 0.25rem;">admin@example.com</code></p>
        <p>Mật khẩu: <code style="background: white; padding: 0.2rem 0.4rem; border-radius: 0.25rem;">123456</code></p>
        <hr style="margin: 0.5rem 0; border: none; border-top: 1px solid var(--gray-300);">
        <p>👥 User - Email: <code style="background: white; padding: 0.2rem 0.4rem; border-radius: 0.25rem;">user@example.com</code></p>

    <div class="footer">
      <p>&copy; 2026 Profile Manager. All rights reserved.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = '/profile.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validation
      if (!email || !password) {
        Alert.error('Vui lòng điền đầy đủ thông tin');
        return;
      }

      if (!isValidEmail(email)) {
        Alert.error('Email không hợp lệ');
        return;
      }

      if (password.length < 6) {
        Alert.error('Mật khẩu phải có ít nhất 6 ký tự');
        return;
      }

      try {
        const button = document.querySelector('button[type="submit"]');
        button.disabled = true;
        button.textContent = 'Đang đăng nhập...';

        const response = await ApiClient.post('/auth/login', {
          email,
          password
        });

        // Save token and user info
        Auth.saveToken(response.token);
        Auth.saveUser(response.user);

        Alert.success('Đăng nhập thành công');
        
        // Redirect after 1 second
        setTimeout(() => {
          window.location.href = '/profile.html';
        }, 1000);
      } catch (error) {
        document.querySelector('button[type="submit"]').disabled = false;
        document.querySelector('button[type="submit"]').textContent = 'Đăng Nhập';
      }
    });
  </script>
</body>
</html>
