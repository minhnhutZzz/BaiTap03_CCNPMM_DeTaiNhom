<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chỉnh Sửa Profile - Profile Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container" style="max-width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
      <a href="/" class="navbar-brand">Profile Manager</a>
      <div class="navbar-menu">
        <span id="userEmail" style="color: var(--gray-600); font-size: 0.875rem; margin-right: 1rem;"></span>
        <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">Đăng Xuất</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="card">
      <div class="card-header">Chỉnh Sửa Thông Tin Cá Nhân</div>

      <form id="editProfileForm">
        <div class="form-group">
          <label for="fullName">Họ Tên <span style="color: var(--gray-400);">(Tùy chọn)</span></label>
          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Ví dụ: Nguyễn Văn A"
            maxlength="255"
          />
          <div class="form-text">Tên đầy đủ của bạn</div>
        </div>

        <div class="form-group">
          <label for="phone">Số Điện Thoại <span style="color: var(--gray-400);">(Tùy chọn)</span></label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="0123456789"
            pattern="[0-9]{10,11}"
          />
          <div class="form-text">Nhập số điện thoại 10-11 chữ số</div>
        </div>

        <div class="form-group">
          <label for="address">Địa Chỉ <span style="color: var(--gray-400);">(Tùy chọn)</span></label>
          <textarea
            id="address"
            name="address"
            placeholder="Ví dụ: 123 Đường ABC, Quận XYZ, TP HCM"
            maxlength="500"
          ></textarea>
          <div class="form-text">Nhập địa chỉ của bạn (tối đa 500 ký tự)</div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary">💾 Lưu Thay Đổi</button>
          <a href="/profile.html" class="btn btn-secondary">❌ Hủy</a>
        </div>
      </form>
    </div>

    <div style="background: var(--primary-light); padding: 1rem; border-radius: 0.375rem; margin-top: 1.5rem; border-left: 4px solid var(--primary-color);">
      <p style="font-size: 0.875rem; color: var(--primary-dark);">
        <strong>💡 Gợi ý:</strong> Bạn có thể cập nhật những thông tin này bất kỳ lúc nào. Tất cả các trường đều là tùy chọn.
      </p>
    </div>

    <div class="footer">
      <p>&copy; 2026 Profile Manager. All rights reserved.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if not logged in
    if (!Auth.isLoggedIn()) {
      window.location.href = '/login.html';
    }

    const form = document.getElementById('editProfileForm');
    const fullNameInput = document.getElementById('fullName');
    const phoneInput = document.getElementById('phone');
    const addressInput = document.getElementById('address');

    // Load current profile
    async function loadProfile() {
      try {
        const response = await ApiClient.get('/profile');
        const { user, profile } = response.data;

        // Set user email in navbar
        document.getElementById('userEmail').textContent = user.email;

        // Fill form with current values
        fullNameInput.value = profile.full_name || '';
        phoneInput.value = profile.phone || '';
        addressInput.value = profile.address || '';
      } catch (error) {
        Alert.error('Không thể tải thông tin hiện tại');
      }
    }

    // Handle form submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullName = fullNameInput.value.trim();
      const phone = phoneInput.value.trim();
      const address = addressInput.value.trim();

      // Validation
      const errors = [];

      if (fullName && fullName.length > 255) {
        errors.push('Họ tên không vượt quá 255 ký tự');
      }

      if (phone) {
        if (!/^[0-9]{10,11}$/.test(phone)) {
          errors.push('Số điện thoại phải có 10-11 chữ số');
        }
      }

      if (address && address.length > 500) {
        errors.push('Địa chỉ không vượt quá 500 ký tự');
      }

      if (errors.length > 0) {
        Alert.error(errors[0]);
        return;
      }

      try {
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = '⏳ Đang lưu...';

        const response = await ApiClient.put('/profile', {
          full_name: fullName || null,
          phone: phone || null,
          address: address || null
        });

        Alert.success('Cập nhật thông tin thành công');

        // Redirect after 1.5 seconds
        setTimeout(() => {
          window.location.href = '/profile.html';
        }, 1500);
      } catch (error) {
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = false;
        submitBtn.textContent = '💾 Lưu Thay Đổi';
      }
    });

    // Load profile on page load
    loadProfile();

    // Format phone number on input
    phoneInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
    });
  </script>
</body>
</html>
